<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAASH Ka Reader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-strong: rgba(255, 255, 255, 0.14);
            --glass-border: rgba(255, 255, 255, 0.24);
            --text-color: #ecf6ff;
            --text-muted: rgba(236, 246, 255, 0.78);
            --accent: #7bd4ff;
            --image-zoom: 1;
            --button-scale: 0.85;
        }
        body {
            font-family: "Nunito", "Quicksand", "Segoe UI Rounded", "Avenir Next Rounded", "Segoe UI", Tahoma, sans-serif;
            background: transparent;
            color: var(--text-color);
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
        }
        html, body { scroll-behavior: auto; margin: 0; }
        #container { max-width: 100%; height: 100vh; width: 100%; position: relative; margin: 0; }
        #header {
            position: fixed;
            top: 12px;
            left: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px) saturate(140%);
            -webkit-backdrop-filter: blur(12px) saturate(140%);
            padding: 12px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            z-index: 10;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transform: scale(var(--button-scale));
            transform-origin: top left;
        }
        #header h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.15px; margin: 0; }
        #header-tools {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }
        #viewer { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; position: relative; }
        #viewer.mode-vertical {
            display: block;
            overflow-y: auto;
            overflow-x: auto;
            padding: 14px 0 20px;
            scroll-behavior: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        #image { max-width: 100%; max-height: 100%; object-fit: contain; transform: scale(var(--image-zoom)); transform-origin: center; }
        #viewer.mode-vertical #image { display: none; }
        #vertical-pages { display: none; width: min(100%, 1000px); margin: 0 auto; padding: 0 12px; }
        #viewer.mode-vertical #vertical-pages { display: flex; flex-direction: column; align-items: center; }
        .vertical-page { width: calc(100% * var(--image-zoom)); height: auto; display: block; background: #000; margin: 6px 0; }
        #controls {
            position: fixed;
            bottom: 12px;
            left: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px) saturate(140%);
            -webkit-backdrop-filter: blur(12px) saturate(140%);
            padding: 10px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 320px;
            z-index: 10;
            transform: scale(var(--button-scale));
            transform-origin: bottom left;
        }
        button,
        .action-link,
        .file-pick-btn,
        #page-input {
            background: var(--glass-bg-strong);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            border-radius: 999px;
            backdrop-filter: blur(9px);
            -webkit-backdrop-filter: blur(9px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 5px 16px rgba(0, 0, 0, 0.22);
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease, opacity 0.18s ease;
            font-size: 12px;
            opacity: 0.8;
            pointer-events: auto;
        }
        button {
            padding: 5px 10px;
            cursor: pointer;
            min-height: 30px;
        }
        .action-link {
            padding: 5px 10px;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            white-space: nowrap;
            width: 100%;
        }
        .file-pick-btn {
            padding: 5px 12px;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            cursor: pointer;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #file-pick-btn {
            min-height: 60px;
            padding: 10px 12px;
            border-radius: 12px;
        }
        #file-pick-btn.needs-file {
            position: relative;
            overflow: hidden;
            opacity: 1;
            animation: pulse-glow 1.8s ease-in-out infinite, color-cycle 5.5s linear infinite;
            border-color: rgba(123, 212, 255, 0.78);
            box-shadow: 0 0 0 1px rgba(123, 212, 255, 0.35), 0 0 18px rgba(123, 212, 255, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.28);
        }
        #file-pick-btn.needs-file::after {
            content: '';
            position: absolute;
            top: -35%;
            left: -40%;
            width: 30%;
            height: 170%;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.52), rgba(255, 255, 255, 0));
            transform: rotate(15deg);
            animation: shine-sweep 2.2s linear infinite;
            pointer-events: none;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 1px rgba(123, 212, 255, 0.32), 0 0 12px rgba(123, 212, 255, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.24); }
            50% { box-shadow: 0 0 0 1px rgba(123, 212, 255, 0.5), 0 0 22px rgba(123, 212, 255, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.32); }
        }
        @keyframes shine-sweep {
            from { left: -45%; }
            to { left: 130%; }
        }
        @keyframes color-cycle {
            0% {
                background: rgba(123, 212, 255, 0.28);
                border-color: rgba(123, 212, 255, 0.78);
                color: #e8f8ff;
            }
            33% {
                background: rgba(120, 255, 191, 0.24);
                border-color: rgba(120, 255, 191, 0.75);
                color: #ebfff5;
            }
            66% {
                background: rgba(255, 194, 116, 0.24);
                border-color: rgba(255, 194, 116, 0.78);
                color: #fff8eb;
            }
            100% {
                background: rgba(123, 212, 255, 0.28);
                border-color: rgba(123, 212, 255, 0.78);
                color: #e8f8ff;
            }
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.35);
            transform: translateY(-1px);
            opacity: 1;
        }
        .action-link:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.35);
            transform: translateY(-1px);
            opacity: 1;
        }
        .file-pick-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.35);
            transform: translateY(-1px);
            opacity: 1;
        }
        button:focus,
        .action-link:focus,
        #page-input:focus,
        .file-pick-btn:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(123, 212, 255, 0.2);
        }
        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }
        #cbz-input { display: none; }
        #info { font-size: 11px; color: var(--text-muted); padding: 2px 4px; }
        #page-input { width: 100%; padding: 4px 7px; text-align: center; min-height: 30px; }
        #controls > div { display: flex; gap: 6px; }
        #controls button { flex: 1; }
        #chapter-toast {
            position: fixed;
            top: 12px;
            right: 12px;
            background: rgba(15, 23, 38, 0.72);
            border: 1px solid rgba(123, 212, 255, 0.4);
            color: #dff4ff;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 12px;
            letter-spacing: 0.2px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(-6px);
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 9;
        }
        #chapter-toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        #tips-dropdown {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 11;
        }
        #tips-trigger {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 12px;
            letter-spacing: 0.2px;
            backdrop-filter: blur(10px) saturate(140%);
            -webkit-backdrop-filter: blur(10px) saturate(140%);
            cursor: default;
        }
        #tips-content {
            position: absolute;
            top: 34px;
            right: 0;
            width: max-content;
            max-width: min(280px, calc(100vw - 24px));
            background: rgba(15, 23, 38, 0.82);
            border: 1px solid rgba(123, 212, 255, 0.35);
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 12px;
            color: #dff4ff;
            line-height: 1.35;
            opacity: 0;
            transform: translateY(-4px);
            pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        #tips-dropdown:hover #tips-content {
            opacity: 1;
            transform: translateY(0);
        }
        #hover-hint {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 12;
            background: rgba(15, 23, 38, 0.74);
            border: 1px solid rgba(123, 212, 255, 0.42);
            color: #dff4ff;
            border-radius: 10px;
            padding: 7px 11px;
            font-size: 12px;
            letter-spacing: 0.15px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        @media (max-width: 640px) {
            #header {
                max-width: calc(100vw - 24px);
                left: 12px;
            }
            #controls {
                max-width: calc(100vw - 24px);
                left: 12px;
            }
        }
        
        #header.faded,
        #controls.faded {
            opacity: 0.65;
            transition: opacity 0.3s ease;
        }
        
        #header:hover,
        #controls:hover,
        #header.faded:hover,
        #controls.faded:hover {
            opacity: 1;
        }
        
        #header.faded,
        #controls.faded {
            opacity: 0.65;
            transition: opacity 0.3s ease;
        }
        
        #header:hover,
        #controls:hover,
        #header.faded:hover,
        #controls.faded:hover {
            opacity: 1;
        }

        body.file-loaded-ui-hide #header,
        body.file-loaded-ui-hide #controls,
        body.file-loaded-ui-hide #tips-dropdown {
            opacity: 0.08;
            transition: opacity 0.18s ease;
        }

        body.file-loaded-ui-hide.ui-awake #header,
        body.file-loaded-ui-hide.ui-awake #controls,
        body.file-loaded-ui-hide.ui-awake #tips-dropdown {
            opacity: 1;
        }

        body.file-loaded-ui-hide.ui-awake button,
        body.file-loaded-ui-hide.ui-awake .action-link,
        body.file-loaded-ui-hide.ui-awake .file-pick-btn,
        body.file-loaded-ui-hide.ui-awake #page-input {
            opacity: 1;
        }

        body.file-loaded-ui-hide:not(.ui-awake) #hover-hint {
            opacity: 1;
        }

        body.file-loaded-ui-hide.ui-awake #hover-hint {
            opacity: 0;
        }

        body.file-loaded-ui-hide #header:hover,
        body.file-loaded-ui-hide #controls:hover,
        body.file-loaded-ui-hide #tips-dropdown:hover,
        body.file-loaded-ui-hide #header.faded:hover,
        body.file-loaded-ui-hide #controls.faded:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="hover-hint">Hover the Mouse here to see Buttons</div>
        <div id="tips-dropdown" aria-label="Tips">
            <div id="tips-trigger">Tips</div>
            <div id="tips-content">For Zooming:<br>1. Use Control + "-" or "+"<br>2. Use Control + Mouse Wheel + </div>
        </div>
        <div id="header">
            <h1>CHAASH Ka Reader</h1>
            <input type="file" id="cbz-input" accept=".cbz" />
            <label class="file-pick-btn needs-file" id="file-pick-btn" for="cbz-input" tabindex="0">Tap to Add!</label>
            <a class="action-link" href="https://drive.google.com/drive/u/0/folders/1zMrGW2MNhqt2z4040tT0x1nYIpxw0_Ir" target="_blank" rel="noopener noreferrer">One Piece Manga - Drive</a>
            <a class="action-link" href="https://drive.google.com/drive/folders/1o4eVcR5P71vqwxMavzZLwNyo5yLl10w-" target="_blank" rel="noopener noreferrer">One Piece Anime - Drive</a>
            <a class="action-link" href="https://www.viz.com/shonenjump/chapters/one-piece" target="_blank" rel="noopener noreferrer">Official Release</a>
            <a class="action-link" href="https://www.reddit.com/r/OnePiece/?f=flair_name%3A%22Current%20Chapter%22" target="_blank" rel="noopener noreferrer">Reddit Reviews</a>
        </div>
        <div id="viewer">
            <img id="image" alt="Manga Page" />
            <div id="vertical-pages"></div>
            <div id="chapter-toast"></div>
        </div>
        <div id="controls">
            <div>
                <button id="prev-btn" onclick="prevPage()">← Prev</button>
                <button id="next-btn" onclick="nextPage()">Next →</button>
            </div>
            <input type="number" id="page-input" min="1" onkeypress="if(event.key==='Enter') goToPage()" />
            <div>
                <button id="goto-btn" onclick="goToPage()">Go</button>
                <button id="mode-btn" onclick="toggleReadingMode()">Mode: Single</button>
            </div>
            <span id="info">Page 1 of 1</span>
            <div>
                <button id="zoom-out-btn" onclick="decreaseImageZoom()">Page −</button>
                <button id="zoom-in-btn" onclick="increaseImageZoom()">Page +</button>
            </div>
            <div>
                <button id="size-down-btn" onclick="decreaseButtonSize()">Buttons −</button>
                <button id="size-up-btn" onclick="increaseButtonSize()">Buttons +</button>
            </div>
        </div>
    </div>

    <script>
        let pages = [];
        let pagePaths = [];
        let chapterLabels = [];
        let chapterStartPages = new Set();
        let currentPage = 0;
        let readingMode = 'single';
        let chapterToastTimer = null;
        let imageZoom = 1;
        let buttonScale = 1;
        let hasLoadedFile = false;
        let uiHideTimer = null;
        const cbzInput = document.getElementById('cbz-input');
        const filePickBtn = document.getElementById('file-pick-btn');
        const header = document.getElementById('header');
        const controls = document.getElementById('controls');
        const tipsDropdown = document.getElementById('tips-dropdown');

        function showUiForAWhile() {
            if (!hasLoadedFile) return;
            document.body.classList.add('ui-awake');
            if (uiHideTimer) {
                clearTimeout(uiHideTimer);
            }
            uiHideTimer = setTimeout(() => {
                document.body.classList.remove('ui-awake');
            }, 3000);
        }
        
        function increaseButtonSize() {
            buttonScale = Math.min(1.5, buttonScale + 0.1);
            document.documentElement.style.setProperty('--button-scale', buttonScale);
        }
        
        function decreaseButtonSize() {
            buttonScale = Math.max(0.7, buttonScale - 0.1);
            document.documentElement.style.setProperty('--button-scale', buttonScale);
        }

        function setImageZoom(factor) {
            const nextZoom = Math.max(0.5, Math.min(3, factor));
            if (nextZoom === imageZoom) return;

            if (readingMode === 'vertical') {
                const verticalImages = document.querySelectorAll('#vertical-pages img[data-page]');
                let anchorImg = null;
                let anchorRatioInImage = 0;
                const viewerTop = viewer.scrollTop;

                for (let i = verticalImages.length - 1; i >= 0; i--) {
                    const imgTop = verticalImages[i].offsetTop;
                    if (imgTop <= viewerTop) {
                        anchorImg = verticalImages[i];
                        const oldImgHeight = Math.max(1, verticalImages[i].offsetHeight);
                        anchorRatioInImage = Math.max(0, Math.min(1, (viewerTop - imgTop) / oldImgHeight));
                        break;
                    }
                }

                if (!anchorImg && verticalImages.length > 0) {
                    anchorImg = verticalImages[0];
                    anchorRatioInImage = 0;
                }

                imageZoom = nextZoom;
                document.documentElement.style.setProperty('--image-zoom', imageZoom);

                requestAnimationFrame(() => {
                    if (!anchorImg) return;
                    const desiredTop = anchorImg.offsetTop + (anchorRatioInImage * anchorImg.offsetHeight);
                    const maxScroll = Math.max(0, viewer.scrollHeight - viewer.clientHeight);
                    viewer.scrollTop = Math.max(0, Math.min(maxScroll, desiredTop));
                });
                return;
            }

            imageZoom = nextZoom;
            document.documentElement.style.setProperty('--image-zoom', imageZoom);
        }
        
        function increaseImageZoom() {
            setImageZoom(imageZoom * 1.1);
        }
        
        function decreaseImageZoom() {
            setImageZoom(imageZoom * 0.9);
        }

        cbzInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            hasLoadedFile = true;
            document.body.classList.add('file-loaded-ui-hide');
            showUiForAWhile();
            filePickBtn.classList.remove('needs-file');
            filePickBtn.textContent = file.name;
            filePickBtn.title = file.name;
            header.classList.add('faded');

            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
            script.onload = () => loadCBZ(file);
            document.head.appendChild(script);
        });

        filePickBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                cbzInput.click();
            }
        });
        
        document.addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });

        // Initialize panels with faded state (50% opacity by default)
        controls.classList.add('faded');
        
        // Simple hover-based fade toggle
        header.addEventListener('mouseenter', () => header.classList.remove('faded'));
        header.addEventListener('mouseleave', () => {
            if (hasLoadedFile) {
                header.classList.add('faded');
            }
        });
        
        controls.addEventListener('mouseenter', () => controls.classList.remove('faded'));
        controls.addEventListener('mouseleave', () => controls.classList.add('faded'));
        header.addEventListener('mouseenter', showUiForAWhile);
        controls.addEventListener('mouseenter', showUiForAWhile);
        tipsDropdown.addEventListener('mouseenter', showUiForAWhile);

        const viewer = document.getElementById('viewer');

        viewer.addEventListener('wheel', (e) => {
            if (!(e.ctrlKey || e.metaKey)) return;
            e.preventDefault();
            const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
            setImageZoom(imageZoom * zoomFactor);
        }, { passive: false });
        
        async function loadCBZ(file) {
            try {
                const JSZip = window.JSZip;
                const zip = await JSZip.loadAsync(file);
                pages = [];
                pagePaths = [];
                chapterLabels = [];
                chapterStartPages = new Set();

                const imageExtensions = ['.jpg', '.jpeg', '.png', '.gif', '.webp'];
                const fileList = [];

                zip.forEach((path) => {
                    const ext = path.toLowerCase().match(/\.[^.]*$/);
                    if (ext && imageExtensions.includes(ext[0])) {
                        fileList.push(path);
                    }
                });

                fileList.sort();

                for (const path of fileList) {
                    const blob = await zip.file(path).async('blob');
                    const url = URL.createObjectURL(blob);
                    pages.push(url);
                    pagePaths.push(path);
                }

                buildChapterMetadata(pagePaths);

                if (pages.length > 0) {
                    currentPage = 0;
                    renderVerticalPages();
                    applyModeClass();
                    displayPage();
                } else {
                    alert('No images found in CBZ file');
                }
            } catch (err) {
                alert('Error reading CBZ file: ' + err.message);
            }
        }

        function renderVerticalPages() {
            const container = document.getElementById('vertical-pages');
            container.innerHTML = '';

            pages.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.alt = `Manga Page ${index + 1}`;
                img.className = 'vertical-page';
                img.loading = 'lazy';
                img.dataset.page = index;
                container.appendChild(img);
            });
        }

        function buildChapterMetadata(paths) {
            chapterLabels = [];
            chapterStartPages = new Set([0]);

            let previousKey = '';

            paths.forEach((path, index) => {
                const chapter = guessChapterFromPath(path, index);
                chapterLabels[index] = chapter.label;

                if (index === 0) {
                    previousKey = chapter.key;
                    return;
                }

                if (chapter.key !== previousKey) {
                    chapterStartPages.add(index);
                }

                previousKey = chapter.key;
            });
        }

        function guessChapterFromPath(path, index) {
            const normalizedPath = path.replace(/\\/g, '/');
            const segments = normalizedPath.split('/').filter(Boolean);
            const filename = segments.length > 0 ? segments[segments.length - 1] : normalizedPath;
            const directory = segments.length > 1 ? segments[segments.length - 2] : '';
            const basename = filename.replace(/\.[^.]+$/, '');

            const chapterMatch = normalizedPath.match(/(?:ch(?:apter)?|ep(?:isode)?|vol(?:ume)?)[\s._-]*([0-9]+(?:\.[0-9]+)?)/i);
            if (chapterMatch) {
                const value = chapterMatch[1];
                return { key: `chapter-${value}`, label: `Chapter ${value}` };
            }

            if (directory) {
                const cleanedDirectory = cleanLabel(directory);
                if (cleanedDirectory) {
                    return { key: `dir-${cleanedDirectory.toLowerCase()}`, label: cleanedDirectory };
                }
            }

            const basePrefix = basename.replace(/(?:^|[\s._-])(p|pg|page|img|image)?\s*0*\d{1,4}$/i, '');
            const cleanedPrefix = cleanLabel(basePrefix);
            if (cleanedPrefix) {
                return { key: `name-${cleanedPrefix.toLowerCase()}`, label: cleanedPrefix };
            }

            return { key: 'chapter-1', label: index === 0 ? 'Chapter 1' : 'Chapter' };
        }

        function cleanLabel(value) {
            return value
                .replace(/[_-]+/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function notifyChapterStart(previousPage) {
            if (!chapterStartPages.has(currentPage) || previousPage === currentPage) {
                return;
            }

            const label = chapterLabels[currentPage] || 'New Chapter';
            const toast = document.getElementById('chapter-toast');
            toast.textContent = `${label} starts`;
            toast.classList.add('show');

            if (chapterToastTimer) {
                clearTimeout(chapterToastTimer);
            }

            chapterToastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 1300);
        }

        function applyModeClass() {
            viewer.classList.remove('mode-single', 'mode-vertical');
            viewer.classList.add(`mode-${readingMode}`);

            const modeBtn = document.getElementById('mode-btn');
            modeBtn.textContent = readingMode === 'vertical' ? 'Mode: Vertical' : 'Mode: Single';
        }

        function toggleReadingMode() {
            readingMode = readingMode === 'single' ? 'vertical' : 'single';
            applyModeClass();

            if (readingMode === 'vertical') {
                imageZoom = 1;
                document.documentElement.style.setProperty('--image-zoom', imageZoom);
                renderVerticalPages();
                viewer.scrollTop = 0;
            }

            displayPage();
        }

        function displayPage() {
            if (pages.length === 0) return;
            const previousPage = currentPage;

            if (readingMode === 'vertical') {
                const current = findCurrentVerticalPage();
                currentPage = current;
                document.getElementById('info').textContent = `Vertical ${current + 1}/${pages.length}`;
                document.getElementById('page-input').value = current + 1;
                notifyChapterStart(previousPage);
                updateControls();
                return;
            }

            document.getElementById('image').src = pages[currentPage];
            document.getElementById('page-input').value = currentPage + 1;
            document.getElementById('info').textContent = `Page ${currentPage + 1} of ${pages.length}`;
            notifyChapterStart(previousPage);
            updateControls();
        }

        function nextPage() {
            if (pages.length === 0) return;

            if (readingMode === 'vertical') {
                const maxScroll = Math.max(0, viewer.scrollHeight - viewer.clientHeight);
                viewer.scrollTop = Math.min(maxScroll, viewer.scrollTop + viewer.clientHeight * 0.84);
                return;
            }

            if (currentPage < pages.length - 1) {
                currentPage = Math.min(pages.length - 1, currentPage + 1);
                displayPage();
            }
        }

        function prevPage() {
            if (pages.length === 0) return;

            if (readingMode === 'vertical') {
                viewer.scrollTop = Math.max(0, viewer.scrollTop - viewer.clientHeight * 0.84);
                return;
            }

            if (currentPage > 0) {
                currentPage = Math.max(0, currentPage - 1);
                displayPage();
            }
        }

        function goToPage() {
            const input = parseInt(document.getElementById('page-input').value) - 1;
            if (input >= 0 && input < pages.length) {
                if (readingMode === 'vertical') {
                    currentPage = input;
                    const target = document.querySelector(`#vertical-pages img[data-page="${input}"]`);
                    if (target) {
                        target.scrollIntoView({ block: 'start' });
                    }
                    displayPage();
                    return;
                }

                currentPage = input;
                displayPage();
            }
        }

        function findCurrentVerticalPage() {
            const verticalImages = document.querySelectorAll('#vertical-pages img[data-page]');
            const viewerTop = viewer.scrollTop;

            for (let i = verticalImages.length - 1; i >= 0; i--) {
                if (verticalImages[i].offsetTop - 16 <= viewerTop) {
                    return parseInt(verticalImages[i].dataset.page, 10);
                }
            }

            return 0;
        }

        function updateControls() {
            const noPages = pages.length === 0;
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const gotoBtn = document.getElementById('goto-btn');
            const pageInput = document.getElementById('page-input');

            if (noPages) {
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                gotoBtn.disabled = true;
                pageInput.disabled = true;
                return;
            }

            if (readingMode === 'vertical') {
                const atTop = viewer.scrollTop <= 2;
                const atBottom = viewer.scrollTop >= viewer.scrollHeight - viewer.clientHeight - 2;
                prevBtn.disabled = atTop;
                nextBtn.disabled = atBottom;
                gotoBtn.disabled = false;
                pageInput.disabled = false;
                return;
            }

            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage >= pages.length - 1;
            gotoBtn.disabled = false;
            pageInput.disabled = false;
        }

        viewer.addEventListener('scroll', () => {
            if (readingMode !== 'vertical') return;
            displayPage();
        });
        
        document.addEventListener('keydown', (e) => {
            const isZoomKey = e.key === '+' || e.key === '=' || e.key === '-' || e.key === '_'
                || e.code === 'NumpadAdd' || e.code === 'NumpadSubtract';
            if ((e.ctrlKey || e.metaKey) && isZoomKey) {
                e.preventDefault();
                if (e.key === '-' || e.key === '_' || e.code === 'NumpadSubtract') {
                    decreaseImageZoom();
                } else {
                    increaseImageZoom();
                }
                return;
            }
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
        });

        applyModeClass();
        updateControls();
    </script>
</body>
</html>
