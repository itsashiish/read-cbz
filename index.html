<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAASH Ka Reader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-strong: rgba(255, 255, 255, 0.14);
            --glass-border: rgba(255, 255, 255, 0.24);
            --text-color: #ecf6ff;
            --text-muted: rgba(236, 246, 255, 0.78);
            --accent: #7bd4ff;
            --button-scale: 1;
        }
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: transparent;
            color: var(--text-color);
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
        }
        html, body { scroll-behavior: smooth; margin: 0; }
        #container { max-width: 100%; height: 100vh; width: 100%; position: relative; margin: 0; }
        #header {
            position: fixed;
            top: 12px;
            left: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px) saturate(140%);
            -webkit-backdrop-filter: blur(12px) saturate(140%);
            padding: 12px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            z-index: 10;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transform: scale(var(--button-scale));
            transform-origin: top left;
        }
        #header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.3px; margin: 0; }
        #header-tools {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }
        #viewer { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; position: relative; }
        #viewer.mode-vertical {
            display: block;
            overflow-y: auto;
            padding: 14px 0 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        #image { max-width: 100%; max-height: 100%; object-fit: contain; }
        #viewer.mode-vertical #image { display: none; }
        #vertical-pages { display: none; width: min(100%, 1000px); margin: 0 auto; padding: 0 12px; }
        #viewer.mode-vertical #vertical-pages { display: block; }
        .vertical-page { width: 100%; height: auto; display: block; background: #000; margin: 0 auto; }
        .page-separator {
            height: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.22);
            margin: 10px 0;
            opacity: 0.8;
        }
        #controls {
            position: fixed;
            bottom: 12px;
            left: 12px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px) saturate(140%);
            -webkit-backdrop-filter: blur(12px) saturate(140%);
            padding: 10px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 320px;
            z-index: 10;
            transform: scale(var(--button-scale));
            transform-origin: bottom left;
        }
        button,
        .action-link,
        .file-pick-btn,
        #page-input {
            background: var(--glass-bg-strong);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            border-radius: 999px;
            backdrop-filter: blur(9px);
            -webkit-backdrop-filter: blur(9px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 5px 16px rgba(0, 0, 0, 0.22);
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
            font-size: 12px;
            pointer-events: auto;
        }
        button {
            padding: 5px 10px;
            cursor: pointer;
            min-height: 30px;
        }
        .action-link {
            padding: 5px 10px;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            white-space: nowrap;
            width: 100%;
        }
        .file-pick-btn {
            padding: 5px 12px;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            cursor: pointer;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.35);
            transform: translateY(-1px);
        }
        .action-link:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.35);
            transform: translateY(-1px);
        }
        .file-pick-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.35);
            transform: translateY(-1px);
        }
        button:focus,
        .action-link:focus,
        #page-input:focus,
        .file-pick-btn:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(123, 212, 255, 0.2);
        }
        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }
        #cbz-input { display: none; }
        #info { font-size: 11px; color: var(--text-muted); padding: 2px 4px; }
        #page-input { width: 100%; padding: 4px 7px; text-align: center; min-height: 30px; }
        #controls > div { display: flex; gap: 6px; }
        #controls button { flex: 1; }
        #chapter-toast {
            position: fixed;
            top: 12px;
            right: 12px;
            background: rgba(15, 23, 38, 0.72);
            border: 1px solid rgba(123, 212, 255, 0.4);
            color: #dff4ff;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 12px;
            letter-spacing: 0.2px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(-6px);
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 9;
        }
        #chapter-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 640px) {
            #header {
                max-width: calc(100vw - 24px);
                left: 12px;
            }
            #controls {
                max-width: calc(100vw - 24px);
                left: 12px;
            }
        }
        
        #header.faded,
        #controls.faded {
            opacity: 0.65;
            transition: opacity 0.3s ease;
        }
        
        #header:hover,
        #controls:hover,
        #header.faded:hover,
        #controls.faded:hover {
            opacity: 1;
        }
        
        #header.faded,
        #controls.faded {
            opacity: 0.65;
            transition: opacity 0.3s ease;
        }
        
        #header:hover,
        #controls:hover,
        #header.faded:hover,
        #controls.faded:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            <h1>CHAASH Ka Reader</h1>
            <input type="file" id="cbz-input" accept=".cbz" />
            <label class="file-pick-btn" id="file-pick-btn" for="cbz-input" tabindex="0">Browse CBZ</label>
            <a class="action-link" href="https://drive.google.com/drive/u/0/folders/1jhcTYjjNXJ-q_6ND-VvyaViaAnFs-xJu" target="_blank" rel="noopener noreferrer">Manga Folder</a>
            <a class="action-link" href="https://www.viz.com/shonenjump/chapters/one-piece" target="_blank" rel="noopener noreferrer">Official Release</a>
            <a class="action-link" href="https://www.reddit.com/r/OnePiece/?f=flair_name%3A%22Current%20Chapter%22" target="_blank" rel="noopener noreferrer">Reddit Reviews</a>
        </div>
        <div id="viewer">
            <img id="image" alt="Manga Page" />
            <div id="vertical-pages"></div>
            <div id="chapter-toast"></div>
        </div>
        <div id="controls">
            <div>
                <button id="prev-btn" onclick="prevPage()">← Prev</button>
                <button id="next-btn" onclick="nextPage()">Next →</button>
            </div>
            <input type="number" id="page-input" min="1" onkeypress="if(event.key==='Enter') goToPage()" />
            <div>
                <button id="goto-btn" onclick="goToPage()">Go</button>
                <button id="mode-btn" onclick="toggleReadingMode()">Mode: Single</button>
            </div>
            <span id="info">Page 1 of 1</span>
            <div>
                <button id="zoom-out-btn" onclick="decreaseButtonSize()">Size −</button>
                <button id="zoom-in-btn" onclick="increaseButtonSize()">Size +</button>
            </div>
        </div>
    </div>

    <script>
        let pages = [];
        let pagePaths = [];
        let chapterLabels = [];
        let chapterStartPages = new Set();
        let currentPage = 0;
        let readingMode = 'single';
        let smoothScrollTarget = 0;
        let smoothScrollFrame = null;
        let chapterToastTimer = null;
        let buttonScale = 1;
        const cbzInput = document.getElementById('cbz-input');
        const filePickBtn = document.getElementById('file-pick-btn');
        const header = document.getElementById('header');
        const controls = document.getElementById('controls');
        
        function increaseButtonSize() {
            buttonScale = Math.min(1.5, buttonScale + 0.1);
            document.documentElement.style.setProperty('--button-scale', buttonScale);
        }
        
        function decreaseButtonSize() {
            buttonScale = Math.max(0.7, buttonScale - 0.1);
            document.documentElement.style.setProperty('--button-scale', buttonScale);
        }

        cbzInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            filePickBtn.textContent = file.name;
            filePickBtn.title = file.name;

            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
            script.onload = () => loadCBZ(file);
            document.head.appendChild(script);
        });

        filePickBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                cbzInput.click();
            }
        });
        
        document.addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });
        
        // Initialize panels with faded state (50% opacity by default)
        header.classList.add('faded');
        controls.classList.add('faded');
        
        // Simple hover-based fade toggle
        header.addEventListener('mouseenter', () => header.classList.remove('faded'));
        header.addEventListener('mouseleave', () => header.classList.add('faded'));
        
        controls.addEventListener('mouseenter', () => controls.classList.remove('faded'));
        controls.addEventListener('mouseleave', () => controls.classList.add('faded'));

        const viewer = document.getElementById('viewer');
        viewer.addEventListener('wheel', (e) => {
            onVerticalWheel(e);
        }, { passive: false });
        
        viewer.addEventListener('mousedown', (e) => {
            if (e.button === 1 && readingMode === 'vertical') {
                e.preventDefault();
                const startY = e.clientY;
                const startScroll = viewer.scrollTop;
                
                function onMouseMove(moveEvent) {
                    const deltaY = moveEvent.clientY - startY;
                    viewer.scrollTop = startScroll - deltaY;
                }
                
                function onMouseUp() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            }
        }, { passive: false });

        function onVerticalWheel(e) {
            if (readingMode !== 'vertical') return;

            e.preventDefault();

            smoothScrollTarget += e.deltaY;
            const maxScroll = viewer.scrollHeight - viewer.clientHeight;
            smoothScrollTarget = Math.max(0, Math.min(maxScroll, smoothScrollTarget));

            if (!smoothScrollFrame) {
                smoothScrollFrame = requestAnimationFrame(stepSmoothScroll);
            }
        }

        function stepSmoothScroll() {
            const delta = smoothScrollTarget - viewer.scrollTop;
            viewer.scrollTop += delta * 0.2;

            if (Math.abs(delta) > 0.6) {
                smoothScrollFrame = requestAnimationFrame(stepSmoothScroll);
            } else {
                viewer.scrollTop = smoothScrollTarget;
                smoothScrollFrame = null;
            }
        }

        async function loadCBZ(file) {
            try {
                const JSZip = window.JSZip;
                const zip = await JSZip.loadAsync(file);
                pages = [];
                pagePaths = [];
                chapterLabels = [];
                chapterStartPages = new Set();

                const imageExtensions = ['.jpg', '.jpeg', '.png', '.gif', '.webp'];
                const fileList = [];

                zip.forEach((path) => {
                    const ext = path.toLowerCase().match(/\.[^.]*$/);
                    if (ext && imageExtensions.includes(ext[0])) {
                        fileList.push(path);
                    }
                });

                fileList.sort();

                for (const path of fileList) {
                    const blob = await zip.file(path).async('blob');
                    const url = URL.createObjectURL(blob);
                    pages.push(url);
                    pagePaths.push(path);
                }

                buildChapterMetadata(pagePaths);

                if (pages.length > 0) {
                    currentPage = 0;
                    renderVerticalPages();
                    applyModeClass();
                    displayPage();
                } else {
                    alert('No images found in CBZ file');
                }
            } catch (err) {
                alert('Error reading CBZ file: ' + err.message);
            }
        }

        function renderVerticalPages() {
            const container = document.getElementById('vertical-pages');
            container.innerHTML = '';

            pages.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.alt = `Manga Page ${index + 1}`;
                img.className = 'vertical-page';
                img.loading = 'lazy';
                img.dataset.page = index;
                container.appendChild(img);

                if (index < pages.length - 1) {
                    const separator = document.createElement('div');
                    separator.className = 'page-separator';
                    container.appendChild(separator);
                }
            });
        }

        function buildChapterMetadata(paths) {
            chapterLabels = [];
            chapterStartPages = new Set([0]);

            let previousKey = '';

            paths.forEach((path, index) => {
                const chapter = guessChapterFromPath(path, index);
                chapterLabels[index] = chapter.label;

                if (index === 0) {
                    previousKey = chapter.key;
                    return;
                }

                if (chapter.key !== previousKey) {
                    chapterStartPages.add(index);
                }

                previousKey = chapter.key;
            });
        }

        function guessChapterFromPath(path, index) {
            const normalizedPath = path.replace(/\\/g, '/');
            const segments = normalizedPath.split('/').filter(Boolean);
            const filename = segments.length > 0 ? segments[segments.length - 1] : normalizedPath;
            const directory = segments.length > 1 ? segments[segments.length - 2] : '';
            const basename = filename.replace(/\.[^.]+$/, '');

            const chapterMatch = normalizedPath.match(/(?:ch(?:apter)?|ep(?:isode)?|vol(?:ume)?)[\s._-]*([0-9]+(?:\.[0-9]+)?)/i);
            if (chapterMatch) {
                const value = chapterMatch[1];
                return { key: `chapter-${value}`, label: `Chapter ${value}` };
            }

            if (directory) {
                const cleanedDirectory = cleanLabel(directory);
                if (cleanedDirectory) {
                    return { key: `dir-${cleanedDirectory.toLowerCase()}`, label: cleanedDirectory };
                }
            }

            const basePrefix = basename.replace(/(?:^|[\s._-])(p|pg|page|img|image)?\s*0*\d{1,4}$/i, '');
            const cleanedPrefix = cleanLabel(basePrefix);
            if (cleanedPrefix) {
                return { key: `name-${cleanedPrefix.toLowerCase()}`, label: cleanedPrefix };
            }

            return { key: 'chapter-1', label: index === 0 ? 'Chapter 1' : 'Chapter' };
        }

        function cleanLabel(value) {
            return value
                .replace(/[_-]+/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function notifyChapterStart(previousPage) {
            if (!chapterStartPages.has(currentPage) || previousPage === currentPage) {
                return;
            }

            const label = chapterLabels[currentPage] || 'New Chapter';
            const toast = document.getElementById('chapter-toast');
            toast.textContent = `${label} starts`;
            toast.classList.add('show');

            if (chapterToastTimer) {
                clearTimeout(chapterToastTimer);
            }

            chapterToastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 1300);
        }

        function applyModeClass() {
            viewer.classList.remove('mode-single', 'mode-vertical');
            viewer.classList.add(`mode-${readingMode}`);

            const modeBtn = document.getElementById('mode-btn');
            modeBtn.textContent = readingMode === 'vertical' ? 'Mode: Vertical' : 'Mode: Single';
        }

        function toggleReadingMode() {
            readingMode = readingMode === 'single' ? 'vertical' : 'single';
            applyModeClass();

            if (readingMode === 'vertical') {
                renderVerticalPages();
                viewer.scrollTop = 0;
                smoothScrollTarget = 0;
            } else if (smoothScrollFrame) {
                cancelAnimationFrame(smoothScrollFrame);
                smoothScrollFrame = null;
            }

            displayPage();
        }

        function displayPage() {
            if (pages.length === 0) return;
            const previousPage = currentPage;

            if (readingMode === 'vertical') {
                const current = findCurrentVerticalPage();
                currentPage = current;
                document.getElementById('info').textContent = `Vertical ${current + 1}/${pages.length}`;
                document.getElementById('page-input').value = current + 1;
                notifyChapterStart(previousPage);
                updateControls();
                return;
            }

            document.getElementById('image').src = pages[currentPage];
            document.getElementById('page-input').value = currentPage + 1;
            document.getElementById('info').textContent = `Page ${currentPage + 1} of ${pages.length}`;
            notifyChapterStart(previousPage);
            updateControls();
        }

        function nextPage() {
            if (pages.length === 0) return;

            if (readingMode === 'vertical') {
                smoothScrollTarget = Math.min(viewer.scrollHeight - viewer.clientHeight, viewer.scrollTop + viewer.clientHeight * 0.84);
                if (!smoothScrollFrame) smoothScrollFrame = requestAnimationFrame(stepSmoothScroll);
                return;
            }

            if (currentPage < pages.length - 1) {
                currentPage = Math.min(pages.length - 1, currentPage + 1);
                displayPage();
            }
        }

        function prevPage() {
            if (pages.length === 0) return;

            if (readingMode === 'vertical') {
                smoothScrollTarget = Math.max(0, viewer.scrollTop - viewer.clientHeight * 0.84);
                if (!smoothScrollFrame) smoothScrollFrame = requestAnimationFrame(stepSmoothScroll);
                return;
            }

            if (currentPage > 0) {
                currentPage = Math.max(0, currentPage - 1);
                displayPage();
            }
        }

        function goToPage() {
            const input = parseInt(document.getElementById('page-input').value) - 1;
            if (input >= 0 && input < pages.length) {
                if (readingMode === 'vertical') {
                    currentPage = input;
                    const target = document.querySelector(`#vertical-pages img[data-page="${input}"]`);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                    displayPage();
                    return;
                }

                currentPage = input;
                displayPage();
            }
        }

        function findCurrentVerticalPage() {
            const verticalImages = document.querySelectorAll('#vertical-pages img[data-page]');
            const viewerTop = viewer.scrollTop;

            for (let i = verticalImages.length - 1; i >= 0; i--) {
                if (verticalImages[i].offsetTop - 16 <= viewerTop) {
                    return parseInt(verticalImages[i].dataset.page, 10);
                }
            }

            return 0;
        }

        function updateControls() {
            const noPages = pages.length === 0;
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const gotoBtn = document.getElementById('goto-btn');
            const pageInput = document.getElementById('page-input');

            if (noPages) {
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                gotoBtn.disabled = true;
                pageInput.disabled = true;
                return;
            }

            if (readingMode === 'vertical') {
                const atTop = viewer.scrollTop <= 2;
                const atBottom = viewer.scrollTop >= viewer.scrollHeight - viewer.clientHeight - 2;
                prevBtn.disabled = atTop;
                nextBtn.disabled = atBottom;
                gotoBtn.disabled = false;
                pageInput.disabled = false;
                return;
            }

            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage >= pages.length - 1;
            gotoBtn.disabled = false;
            pageInput.disabled = false;
        }

        viewer.addEventListener('scroll', () => {
            if (readingMode !== 'vertical') return;
            displayPage();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
        });

        applyModeClass();
        updateControls();
    </script>
</body>
</html>
